name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Least privilege: the job only needs to read the repository.
permissions:
  contents: read

# Don't run overlapping deploys for the same branch.
concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      # Security gate: fail the pipeline if anything that SHIPS to production
      # has a high/critical CVE. Dev-only build tooling (vite/esbuild) is
      # tracked separately by Dependabot and does not block deploys.
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      # Fail fast with a readable message if the Cloudflare secrets are missing,
      # instead of an opaque wrangler "exit code 1".
      - name: Verify Cloudflare credentials are configured
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          [ -n "$CF_TOKEN" ]   || { echo "::error::Missing repository secret CLOUDFLARE_API_TOKEN"; exit 1; }
          [ -n "$CF_ACCOUNT" ] || { echo "::error::Missing repository secret CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          echo "Cloudflare credentials present."

      # Creates the Pages project on the first run. On later runs it already
      # exists, so the "already exists" error is ignored and we go to deploy.
      - name: Ensure Cloudflare Pages project exists
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create trodriten-portfolio --production-branch=master

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=trodriten-portfolio --branch=${{ github.ref_name }} --commit-dirty=true
