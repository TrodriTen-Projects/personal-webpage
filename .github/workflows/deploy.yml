name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Least privilege: the job only needs to read the repository.
permissions:
  contents: read

# Don't run overlapping deploys for the same branch.
concurrency:
  group: cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      # Security gate: fail the pipeline if anything that SHIPS to production
      # has a high/critical CVE. Dev-only build tooling (vite/esbuild) is
      # tracked separately by Dependabot and does not block deploys.
      - name: Security audit (production dependencies)
        run: npm audit --omit=dev --audit-level=high

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=trodriten-portfolio --branch=${{ github.ref_name }}
